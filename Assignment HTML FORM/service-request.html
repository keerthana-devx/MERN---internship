<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Request Form</title>

    <style>
        body{
            background: linear-gradient(to right, #fddb92, #d1fdff);
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1{
            text-align: center;
        }

        form{
            background-color: rgb(193, 131, 131);
            padding: 20px;
            border-radius: 10px;
            width: 500px;
            margin: auto;
            box-shadow: 0 0 10px rgb(207, 148, 148);
        }

        input, textarea, select{
            padding: 6px;
            margin-top: 5px;
            margin-bottom: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        textarea{
            width: 100%;
        }

        button{
            padding: 8px 15px;
            background-color: #ff7e5f;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: #e0674c;
        }
    </style>
</head>

<body>

<h1>Service Request Form</h1>

<form>

    <!-- Customer Name -->
    <label>Customer Name:</label>
    <input type="text" name="customer_name" placeholder="Enter your name" required>
    <br><br>

    <!-- Contact Number -->
    <label>Contact Number:</label>
    <input type="tel" name="contact" placeholder="Enter phone number" required>
    <br><br>

    <!-- Issue Type -->
    <label>Issue Type:</label><br>
    <select name="issue">
        <option>Laptop Repair</option>
        <option>Internet Issue</option>
        <option>Software Problem</option>
        <option>Hardware Issue</option>
    </select>
    <br><br>

    <!-- Description -->
    <label>Description:</label><br>
    <textarea name="description" rows="4" placeholder="Describe your issue..." required></textarea>
    <br><br>

    <!-- Priority -->
    <label>Priority:</label><br>
    <input type="radio" name="priority" value="low"> Low
    <input type="radio" name="priority" value="medium"> Medium
    <input type="radio" name="priority" value="high"> High
    <br><br>

    <!-- Submit -->
    <button type="submit">Submit Request</button>

</form>

</body>
</html>
