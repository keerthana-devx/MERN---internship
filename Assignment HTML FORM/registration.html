<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>

    <style>
        body{
            background: linear-gradient(to right, #d9a7c7, #fffcdc);
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1{
            text-align: center;
        }

        form{
            background-color: rgb(202, 128, 160);
            padding: 20px;
            border-radius: 10px;
            width: 500px;
            margin: auto; /* center horizontally */
            box-shadow: 0 0 10px rgb(127, 35, 35);
        }

        input{
            padding: 6px;
            margin-top: 5px;
            margin-bottom: 10px;
            border-radius: 5px;
            border: 1px solid #b467a2;
        }

        button{
            padding: 8px 15px;
            background-color: #6c63ff;
            color: rgb(202, 85, 208);
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: #4b45c5;
        }
    </style>
</head>

<body>

    <h1>Registration form</h1>

    <form action="" method="post">

    <label>Full name : </label>
    <input type="text" required placeholder="enter your full name"><br><br>
     
    <label>Email : </label>
    <input type="email" required placeholder="enter your email"><br><br>

    <label>Password : </label>
    <input type="password" required placeholder="enter your password"><br><br>

    <label>Confirm Password : </label>
    <input type="password" required placeholder="enter again password"><br><br>

    <label>Gender : </label>
    <input type="radio" name="Gender">Female
    <input type="radio" name="Gender">Male
    <input type="radio" name="Gender">Others

    <br><br>

    <label>Hobbies : </label>
    <input type="checkbox">Reading
    <input type="checkbox">Singing
    <input type="checkbox">Drawing
    <br><br>

    <label>Date Of Birth : </label>
    <input type="date">

    <br><br>

    <button type="submit">Submit</button>

    </form>

</body>
</html>
