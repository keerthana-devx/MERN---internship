<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        body{
            display: flex;
            justify-content: center;
            height:100vh;
            align-items: center;
            
        }
        .container{
            border:2px solid black;
            padding:30px;
            background-color: rgb(234, 213, 236);
            border-radius: 10px;
        }
        input{
            width:400px;
            padding:30px;
            border:1px solid rgb(153, 20, 20);
            background-color: rgb(195, 232, 232);
        }
        #button-container div{
            border: 2px solid rgb(218, 118, 134);
            background-color:rgb(237, 225, 209);
            border-radius: 8px;
            padding: 10px;
        

            text-align: center;
    
        }
        #button-container{
            display: grid;
            grid-template-columns: auto auto auto auto;
           
            margin-top: 30px;
            row-gap: 10px;
            column-gap: 10px;
           
            padding:20px;
            background-color: rgb(239, 206, 155);
            

            
        }
        #button-container div:nth-child(16){
            grid-row-start: 4;
            grid-column-start: 4;
            grid-row-end: 6;
        }
        #button-container div:nth-child(1){
            grid-column-start: 1;
            grid-column-end: 2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div>
            <input type="number" readonly placeholder="0">

        </div>
        <div id="button-container">
            <div>sin</div>
            <div>tan</div>
            <div>cos</div>
            <div>AC</div>
            <div>9</div>
            <div>8</div>
            <div>7</div>
            <div>*</div>
            <div>4</div>
            <div>5</div>
            <div>6</div>
            <div>-</div>
             <div>1</div>
            <div>2</div>
            <div>3</div>
            <div>+</div>
            <div>0</div>
            
             <div>=</div>
            <div>/</div>
            
            
            
            
        </div>
    </div>
</body>
</html>
