<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        li:first-child{
            color:rgb(136, 212, 187);
            background-color: brown;
        }
        li:nth-child(2){
            color:blue;
            background-color: rgb(83, 155, 94);
        }
        li:nth-child(3){
            border: 10px solid rgba(255,50,20,0.5);
            background-color:rgba(150,30,65,0.5);

        }
        li:nth-child(4){
            background-color: hsl(350deg,60%,50%);
        }
        li:nth-child(5){
            background-color: rgba(150,30,65,0.5);
            color:rgba(200,20,25,0.8);
        }
        li:nth-child(6){
            background-color: #f066;
        }
        h1{
            color:transparent;
            background-color: aquamarine;
        }

    </style>
</head>
<body>
    <h1>color color what u want</h1>
    <ol>
        <li><h4>heading1</h4></li>
         <li><h4>heading1</h4></li>
          <li><h4>heading1</h4></li>
           <li><h4>heading1</h4></li>
            <li><h4>heading1</h4></li>
            <li><h4>heading6</h4></li>

    </ol>

       
        
    
</body>
</html>
