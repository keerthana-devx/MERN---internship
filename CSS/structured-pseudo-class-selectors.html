<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        li:first-child{
            background-color: blueviolet;
        }
        button:first-of-type{
            background-color: aquamarine;
        }
        span:first-child{
            background-color: aqua;
        }
        button:last-of-type{
            background-color: black;

        }
        button:nth-child(3){
            background-color: rgb(132, 110, 152);
        }
        ol{
            background-color: blanchedalmond;
        }
        li:nth-child(odd){
            background-color: aquamarine;
        }
        button:nth-child(even){
            background-color: blueviolet;
        }
         li:nth-child(4){
            background-color: rgb(132, 110, 152);
            text-align: center;
    
            text-shadow: 20px;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            font-size: 30px;
           
            text-decoration: dotted;
            margin: 50px;
        }
        a:visited{
         color: brown;
        }
        a:active{
            color: palevioletred;
        }
        input:focus{
            background-color: blueviolet;
            width: 300px;

        }
        div{
            height: 150px;
            background-color: cadetblue;
            width: 200px;
        }
        a:hover{
            font-style: italic;
            text-decoration: dotted;
        }  

    </style>
</head>
<body>
    <input type="search" placeholder="search">
    <h4>
         <a href="https://www.youtube.com">youtube</a>
    </h4>
    <ol>
        <li>list-items</li>
        <li>list-items</li>
        <li>list-items</li>
        <li>list-items</li>
        <li>list-items</li>
    </ol>
    <div>
        <span>tag</span>
        <button>b1</button>
        <button>b2</button>
        <button>b3</button>
        <button>b4</button>
        <button>b5</button>
    </div>

    <h4>college</h4>
    
   
</body>
</html>
