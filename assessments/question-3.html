<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Login Page</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;

           
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
        }

       
        .box {
            border: 1px solid #333;
            padding: 25px;
            width: 260px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h3 {
            text-align: center;
            color: #333;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;

            border: 1px solid #ccc;
            border-radius: 5px;
        }

        
        button {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0a320c;
        }

      
        @media (max-width: 600px) {
            .box {
                width: 80%;
            }
        }
    </style>
</head>

<body>

<div class="box">
    <h3>Login</h3>

    <input type="text" placeholder="Enter Username">
    <input type="password" placeholder="Enter Password">

    <button>Login</button>
</div>

</body>
</html>
